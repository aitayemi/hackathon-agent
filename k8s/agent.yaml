---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bedrock-service-account
  namespace: techcompany-sim
  annotations:
    # Replace with your IRSA role ARN that has bedrock:InvokeModel permission
    eks.amazonaws.com/role-arn: arn:aws:iam::440310653679:role/eksctl-mlops-18040-addon-iamserviceaccount-te-Role1-hHFsQOkaY6cI

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-agent
  namespace: techcompany-sim
  labels:
    app: hackathon-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackathon-agent
  template:
    metadata:
      labels:
        app: hackathon-agent
    spec:
      serviceAccountName: bedrock-service-account
      containers:
        - name: agent
          image: 440310653679.dkr.ecr.us-east-1.amazonaws.com/aitayemi-ecr:hackathon-agent-latest
          imagePullPolicy: Always
          env:
            - name: UC1_BASE_URL
              value: "http://techcompany-sim-uc1.techcompany-sim:8001"
            - name: UC2_BASE_URL
              value: "http://techcompany-sim-uc2.techcompany-sim:8002"
            - name: POLL_INTERVAL
              value: "3.0"
            - name: ANALYSIS_INTERVAL
              value: "30.0"
            - name: BEDROCK_REGION
              value: "us-west-2"
            - name: BEDROCK_MODEL_ID
              value: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SMTP_HOST
              value: "192.168.0.46"
            - name: SMTP_PORT
              value: "25"
            - name: EMAIL_FROM
              value: "anomaly-agent@domain.com"
            - name: EMAIL_TO
              value: "johnwicks@domain.com"
            - name: EMAIL_ENABLED
              value: "true"
            - name: SMTP_USERNAME
              value: "johnwicks"
            - name: SMTP_PASSWORD
              value: "johnwicks12345!"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8080
              name: dashboard

---
apiVersion: v1
kind: Service
metadata:
  name: hackathon-agent
  namespace: techcompany-sim
  labels:
    app: hackathon-agent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: hackathon-agent
  ports:
    - port: 8080
      targetPort: dashboard
      protocol: TCP
      name: http
