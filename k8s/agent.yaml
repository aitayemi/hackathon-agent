---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hackathon-agent
  namespace: techcompany-sim
  annotations:
    # Replace with your IRSA role ARN that has bedrock:InvokeModel permission
    eks.amazonaws.com/role-arn: arn:aws:iam::440310653679:role/eksctl-mlops-18040-addon-iamserviceaccount-te-Role1-hHFsQOkaY6cI

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-agent
  namespace: techcompany-sim
  labels:
    app: hackathon-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackathon-agent
  template:
    metadata:
      labels:
        app: hackathon-agent
    spec:
      serviceAccountName: bedrock-service-account
      containers:
        - name: agent
          image: 440310653679.dkr.ecr.us-east-1.amazonaws.com/aitayemi-ecr:hackathon-agent-latest
          env:
            - name: UC1_BASE_URL
              value: "http://techcompany-sim-uc1.techcompany-sim:8001"
            - name: UC2_BASE_URL
              value: "http://techcompany-sim-uc2.techcompany-sim:8002"
            - name: POLL_INTERVAL
              value: "3.0"
            - name: ANALYSIS_INTERVAL
              value: "30.0"
            - name: BEDROCK_REGION
              value: "us-west-2"
            - name: BEDROCK_MODEL_ID
              value: "us.anthropic.claude-3-5-haiku-20241022-v1:0"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8080
              name: dashboard

---
apiVersion: v1
kind: Service
metadata:
  name: hackathon-agent
  namespace: techcompany-sim
  labels:
    app: hackathon-agent
spec:
  selector:
    app: hackathon-agent
  ports:
    - port: 8080
      targetPort: dashboard
      protocol: TCP
      name: http
